<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Document Automation</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>AI Document Automation</h1>
        <p>Day 1 MVP skeleton: paste text, run mock automation, view structured output.</p>
      </header>

      <section class="card">
        <label for="documentText">Document text</label>
        <textarea
          id="documentText"
          rows="10"
          placeholder="Paste contract clause, SOP, or any text..."
        ></textarea>

        <button id="runButton" type="button">Run Automation</button>
      </section>

      <section class="card">
        <h2>Result</h2>
        <pre id="result">No output yet.</pre>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
